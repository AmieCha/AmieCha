<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E1A47">
        <animate attributeName="stop-color" values="#2E1A47;#4B0082;#2E1A47" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
      </stop>
      <stop offset="50%" stop-color="#8A2BE2">
        <animate attributeName="stop-color" values="#8A2BE2;#9370DB;#8A2BE2" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
      </stop>
      <stop offset="100%" stop-color="#9370DB">
        <animate attributeName="stop-color" values="#9370DB;#CBA6F7;#9370DB" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1"/>
      </stop>
    </linearGradient>
    <clipPath id="rectClip">
      <rect width="800" height="200" rx="18" />
    </clipPath>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
    </filter>
    <style>
      .title { font-family: 'Outfit','Segoe UI',sans-serif; font-weight: 800; font-size: 40px; fill: #ffffff; opacity: 0; transform: translateY(12px); animation: riseIn 1.4s cubic-bezier(.22,1,.36,1) 0.2s forwards; }
      .titleGlow { font-family: 'Outfit','Segoe UI',sans-serif; font-weight: 800; font-size: 40px; fill: #e0c3fc; filter: url(#glow); opacity: 0; animation: glowPulse 4s ease-in-out 1.6s infinite; }
      .subtitle { font-family: 'Segoe UI',sans-serif; font-size: 15px; fill: #e6d9fb; letter-spacing: 3px; opacity: 0; animation: fadeIn 1.2s ease-out 1s forwards; }
      @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes glowPulse { 0%, 100% { opacity: .25; } 50% { opacity: .6; } }
      .particle { animation-name: floatUp; animation-timing-function: ease-in-out; animation-iteration-count: infinite; fill: #ffffff; }
      @keyframes floatUp {
        0% { transform: translateY(0); opacity: 0; }
        15% { opacity: .85; }
        85% { opacity: .4; }
        100% { transform: translateY(-160px); opacity: 0; }
      }
      .wave { animation: waveAnim 14s ease-in-out infinite; }
      .wave2 { animation: waveAnim 20s ease-in-out infinite reverse; opacity: .35; }
      @keyframes waveAnim {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(-30px); }
      }
    </style>
  </defs>

  <rect width="800" height="200" rx="18" fill="url(#bgGrad)" />

  <g clip-path="url(#rectClip)">
    <!-- floating particles -->
    <circle class="particle" cx="50" cy="185" r="1.8" style="animation-duration:9s; animation-delay:0s;" />
    <circle class="particle" cx="120" cy="190" r="1.3" style="animation-duration:12s; animation-delay:1.5s;" />
    <circle class="particle" cx="200" cy="180" r="2.2" style="animation-duration:8s; animation-delay:3s;" />
    <circle class="particle" cx="280" cy="192" r="1.5" style="animation-duration:14s; animation-delay:0.5s;" />
    <circle class="particle" cx="360" cy="185" r="1.9" style="animation-duration:10s; animation-delay:4s;" />
    <circle class="particle" cx="430" cy="188" r="1.2" style="animation-duration:13s; animation-delay:2s;" />
    <circle class="particle" cx="500" cy="182" r="2.4" style="animation-duration:9s; animation-delay:5s;" />
    <circle class="particle" cx="570" cy="190" r="1.6" style="animation-duration:11s; animation-delay:1s;" />
    <circle class="particle" cx="640" cy="186" r="2" style="animation-duration:15s; animation-delay:3.5s;" />
    <circle class="particle" cx="700" cy="192" r="1.4" style="animation-duration:8.5s; animation-delay:6s;" />
    <circle class="particle" cx="760" cy="184" r="1.8" style="animation-duration:12.5s; animation-delay:2.5s;" />
    <circle class="particle" cx="20" cy="178" r="1.3" style="animation-duration:10.5s; animation-delay:4.5s;" />

    <!-- animated wave overlays -->
    <path class="wave2" d="M 0 120 Q 200 100 400 130 T 800 110 L 800 200 L 0 200 Z" fill="#ffffff" />
    <path class="wave" d="M 0 140 Q 200 160 400 130 T 800 150 L 800 200 L 0 200 Z" fill="#ffffff" fill-opacity="0.15" />
  </g>

  <!-- content -->
  <text x="50%" y="92" text-anchor="middle" class="titleGlow">Amie Cha</text>
  <text x="50%" y="92" text-anchor="middle" class="title">Amie Cha</text>
  <text x="50%" y="128" text-anchor="middle" class="subtitle">SECURITY ENGINEER &amp; DEVELOPER</text>

  <rect x="400" y="142" width="0" height="2" rx="1" fill="#cba6f7">
    <animate attributeName="x" from="400" to="340" dur="0.9s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1" />
    <animate attributeName="width" from="0" to="120" dur="0.9s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1" />
  </rect>

  <rect x="1" y="1" width="798" height="198" rx="17" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
</svg>
