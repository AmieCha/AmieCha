<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2B1D3D" />
      <stop offset="55%" stop-color="#4B3B6B" />
      <stop offset="100%" stop-color="#6E5D91" />
    </linearGradient>
    <radialGradient id="blobGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9C2E0" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#C9C2E0" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blobGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9A8FBF" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#9A8FBF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <clipPath id="rectClip">
      <rect width="800" height="200" rx="18" />
    </clipPath>
    <filter id="heavyBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="32" />
    </filter>
    <style>
      .title { font-family: 'Outfit','Segoe UI',sans-serif; font-weight: 700; font-size: 38px; fill: #f3f0fa; opacity: 0; transform: translateY(8px); animation: riseIn 1.4s cubic-bezier(.22,1,.36,1) 0.2s forwards; }
      .subtitle { font-family: 'Segoe UI',sans-serif; font-size: 14px; fill: #cfc6e6; letter-spacing: 3px; opacity: 0; animation: fadeIn 1.4s ease-out 0.8s forwards; }
      @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn { to { opacity: 1; } }
      .blob1 { animation: drift1 26s ease-in-out infinite; }
      .blob2 { animation: drift2 32s ease-in-out infinite; }
      @keyframes drift1 {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(24px, 14px); }
      }
      @keyframes drift2 {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-22px, -12px); }
      }
      .sheen { animation: sweep 11s ease-in-out infinite; }
      @keyframes sweep {
        0% { transform: translateX(-250px); opacity: 0; }
        12% { opacity: .9; }
        38% { opacity: .9; }
        50% { transform: translateX(900px); opacity: 0; }
        100% { transform: translateX(900px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="800" height="200" rx="18" fill="url(#bgGrad)" />

  <g clip-path="url(#rectClip)">
    <ellipse class="blob1" cx="140" cy="40" rx="150" ry="95" fill="url(#blobGrad1)" filter="url(#heavyBlur)" />
    <ellipse class="blob2" cx="660" cy="170" rx="170" ry="105" fill="url(#blobGrad2)" filter="url(#heavyBlur)" />

    <!-- soft top glass highlight -->
    <ellipse cx="400" cy="-40" rx="430" ry="70" fill="#ffffff" opacity="0.05" />

    <!-- slow diagonal sheen sweep -->
    <rect class="sheen" x="0" y="0" width="160" height="200" fill="url(#sheen)" transform="skewX(-12)" />
  </g>

  <!-- glass pane border -->
  <rect x="1" y="1" width="798" height="198" rx="17" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1" />

  <!-- content -->
  <text x="50%" y="90" text-anchor="middle" class="title">Amie Cha</text>
  <text x="50%" y="124" text-anchor="middle" class="subtitle">SECURITY ENGINEER &amp; DEVELOPER</text>
</svg>
