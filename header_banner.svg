<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="blobA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9B8F0" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#C9B8F0" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blobB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E5D9FF" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#E5D9FF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18" />
    </linearGradient>
    <clipPath id="outerClip">
      <rect width="800" height="200" rx="28" />
    </clipPath>
    <filter id="bgBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#6C5B8C" flood-opacity="0.16" />
    </filter>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; font-size: 33px; fill: #3D3358; opacity: 0; transform: translateY(8px); animation: riseIn 1.3s cubic-bezier(.22,1,.36,1) 0.2s forwards; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 500; font-size: 12px; fill: #7A6F99; letter-spacing: 3px; opacity: 0; animation: fadeIn 1.3s ease-out 0.7s forwards; }
      @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn { to { opacity: 1; } }
      .glow { animation: breathe 10s ease-in-out infinite; }
      @keyframes breathe { 0%, 100% { opacity: 0.45; } 50% { opacity: 0.7; } }
    </style>
  </defs>

  <g clip-path="url(#outerClip)">
    <ellipse class="glow" cx="120" cy="55" rx="190" ry="130" fill="url(#blobA)" filter="url(#bgBlur)" />
    <ellipse cx="690" cy="150" rx="200" ry="120" fill="url(#blobB)" filter="url(#bgBlur)" />
  </g>

  <!-- glass card -->
  <rect x="40" y="30" width="720" height="140" rx="26" fill="url(#panelGrad)" stroke="#ffffff" stroke-opacity="0.65" stroke-width="1" filter="url(#cardShadow)" />
  <rect x="64" y="32" width="672" height="1.5" rx="0.75" fill="#ffffff" opacity="0.45" />

  <!-- content -->
  <text x="50%" y="105" text-anchor="middle" class="title">Amie Cha</text>
  <text x="50%" y="132" text-anchor="middle" class="subtitle">SECURITY ENGINEER &amp; DEVELOPER</text>
</svg>
