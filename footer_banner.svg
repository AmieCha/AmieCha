<svg width="800" height="110" viewBox="0 0 800 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fgrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6E5D91" />
      <stop offset="55%" stop-color="#4B3B6B" />
      <stop offset="100%" stop-color="#2B1D3D" />
    </linearGradient>
    <radialGradient id="fblob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9C2E0" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#C9C2E0" stop-opacity="0" />
    </radialGradient>
    <clipPath id="fclip">
      <rect width="800" height="110" rx="18" />
    </clipPath>
    <filter id="fblur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28" />
    </filter>
    <style>
      .fblob1 { animation: fdrift 28s ease-in-out infinite; }
      @keyframes fdrift {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-20px, 10px); }
      }
      .ftext { font-family: 'Segoe UI',sans-serif; font-size: 17px; font-weight: 600; fill: #f3f0fa; opacity: 0; animation: ffade 1.4s ease-out 0.3s forwards; }
      .fsub { font-family: 'Segoe UI',sans-serif; font-size: 11px; fill: #cfc6e6; letter-spacing: 1.5px; opacity: 0; animation: ffade 1.4s ease-out 0.8s forwards; }
      @keyframes ffade { to { opacity: 1; } }
    </style>
  </defs>
  <rect width="800" height="110" rx="18" fill="url(#fgrad)" />
  <g clip-path="url(#fclip)">
    <ellipse class="fblob1" cx="600" cy="30" rx="180" ry="80" fill="url(#fblob)" filter="url(#fblur)" />
    <rect x="1" y="1" width="798" height="108" rx="17" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" />
  </g>
  <text x="50%" y="55" text-anchor="middle" class="ftext">Thanks for stopping by</text>
  <text x="50%" y="78" text-anchor="middle" class="fsub">LET'S BUILD SOMETHING SECURE TOGETHER</text>
</svg>
