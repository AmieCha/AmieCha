<svg width="800" height="120" viewBox="0 0 800 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fgrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9370DB" />
      <stop offset="50%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#2E1A47" />
    </linearGradient>
    <clipPath id="fclip">
      <rect width="800" height="120" rx="18" />
    </clipPath>
    <style>
      .fwave { animation: fwaveAnim 16s ease-in-out infinite; }
      .fwave2 { animation: fwaveAnim 22s ease-in-out infinite reverse; opacity: .3; }
      @keyframes fwaveAnim { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(28px); } }
      .ftext { font-family: 'Segoe UI',sans-serif; font-size: 18px; font-weight: 600; fill: #ffffff; opacity: 0; animation: ffade 1.4s ease-out 0.3s forwards; }
      .fsub { font-family: 'Segoe UI',sans-serif; font-size: 12px; fill: #e6d9fb; letter-spacing: 1.5px; opacity: 0; animation: ffade 1.4s ease-out 0.8s forwards; }
      @keyframes ffade { to { opacity: 1; } }
    </style>
  </defs>
  <rect width="800" height="120" rx="18" fill="url(#fgrad)" />
  <g clip-path="url(#fclip)">
    <path class="fwave2" d="M 0 20 Q 200 45 400 15 T 800 30 L 800 0 L 0 0 Z" fill="#ffffff" fill-opacity="0.12" />
    <path class="fwave" d="M 0 35 Q 200 10 400 38 T 800 15 L 800 0 L 0 0 Z" fill="#ffffff" fill-opacity="0.18" />
  </g>
  <text x="50%" y="62" text-anchor="middle" class="ftext">Thanks for stopping by 💜</text>
  <text x="50%" y="86" text-anchor="middle" class="fsub">LET'S BUILD SOMETHING SECURE TOGETHER</text>
</svg>
