<svg width="800" height="6" viewBox="0 0 800 6" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E1A47" />
      <stop offset="50%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#CBA6F7" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <clipPath id="barClip">
      <rect width="800" height="6" rx="3" />
    </clipPath>
  </defs>
  <g clip-path="url(#barClip)">
    <rect width="800" height="6" fill="url(#barGrad)" />
    <rect x="-200" width="200" height="6" fill="url(#shimmer)">
      <animate attributeName="x" from="-200" to="800" dur="3.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1" keyTimes="0;1" />
    </rect>
  </g>
</svg>
